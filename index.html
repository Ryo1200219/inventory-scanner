<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫管理スキャナー</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./inventory-scanner.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #reader { width: 100%; max-width: 500px; margin: 20px auto; }
    input { padding: 15px; font-size: 1.5rem; width: 80%; margin: 10px 0; border: 2px solid #ccc; border-radius: 5px; }
    button { padding: 15px 30px; font-size: 1.2rem; background: #007bff; color: white; border: none; border-radius: 5px; width: 80%; }
    /* ボタンが無効化された時の見た目 */
    button:disabled { background: #ccc !important; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>在庫管理スキャナー</h3>
  <div id="reader"></div>
  <div id="inputArea" style="display:none;">
    <p id="janText" style="font-weight:bold; margin-bottom: 5px;"></p>
    <p id="stockText" style="color: #28a745; font-weight: bold; font-size: 1.2rem; margin-top: 0;"></p>
    <input type="number" id="qty" value="1" inputmode="decimal" pattern="\d*">
    <br>
    <button id="regBtn" onclick="sendData()">登録</button>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>

   const GAS_URL = "https://script.google.com/macros/s/AKfycbxE2WUH8SuUtiCf_Mkpa2rE4FNXdvR1vFc_q0VkCfTNx3jqG75aTPDPbHR21X9xMIFncA/exec"; 

    // サービスワーカーの登録（PWA化）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW登録成功', reg.scope))
          .catch(err => console.log('SW登録失敗', err));
      });
    }

    let html5QrCode;
    let currentJan = "";
    let localInventory = {}; // ★スマホ側に保持する在庫データ

    // --- 1. GASから全在庫データを一括取得する関数 ---
    async function refreshInventory() {
      console.log("在庫リストを更新中...");
      try {
        const response = await fetch(GAS_URL);
        const result = await response.json();
        if (result.status === "success") {
          localInventory = result.data;
          console.log("在庫リストの同期完了", localInventory);
        }
      } catch (err) {
        console.error("在庫データの取得に失敗しました", err);
      }
    }

    // 起動時に実行
    refreshInventory();

    // --- 2. カメラ起動 ---
    function startScanner() {
      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('reader').style.display = 'block';
      document.getElementById('stockText').innerText = "";

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
      }

      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 280, height: 150 } },
        (data) => {
          currentJan = data;
          // スキャン成功時の処理
          html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('janText').innerText = "JAN: " + data;
            
            // ★通信を待たずに、手元のデータから即座に表示！
            const stock = localInventory[data] || 0;
            document.getElementById('stockText').innerText = "BY現在庫: " + stock + " 個";
            
            const inputArea = document.getElementById('inputArea');
            inputArea.style.display = 'block';

            // 数量入力へ自動フォーカス
            setTimeout(() => {
              const qtyInput = document.getElementById('qty');
              qtyInput.focus();
              qtyInput.select();
            }, 200);
          });
        }
      ).catch(err => alert("カメラ起動エラー: " + err));
    }

    // --- 3. 在庫登録処理 ---
    async function sendData() {
      const qty = document.getElementById('qty').value;
      if (!qty) return alert("数量を入れてね");

      const btn = document.querySelector('button[onclick="sendData()"]');
      btn.disabled = true;
      btn.innerText = "送信中...";

      try {
        const params = new URLSearchParams({
          jan: currentJan,
          qty: qty
        });

        const response = await fetch(GAS_URL, {
          method: "POST",
          body: params
        });

        const result = await response.json();

        if (result.status === "success") {
          alert("登録完了！");

          // ★【追加】ネットの返事を待たずに、手元の数字を自分で書き換える
          // いま入力した数量（qty）を、現在の在庫（localInventory[currentJan]）に加算
          const currentStock = parseInt(localInventory[currentJan] || 0);
          const inputQty = parseInt(qty);
          localInventory[currentJan] = currentStock + inputQty; 

          document.getElementById('qty').value = "1";
          
          // バックグラウンドで本当の最新値を取る（これは保険として残してOK）
          refreshInventory(); 
          
          startScanner(); 

        } else {
          alert("エラー: " + result.message);
        }
      } catch (err) {
        alert("送信に失敗しました");
      } finally {
        btn.disabled = false;
        btn.innerText = "登録";
      }
    }

    // 最初のカメラ起動
    startScanner();
  </script>
</body>
</html>
