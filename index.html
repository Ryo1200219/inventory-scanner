<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫管理スキャナー</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./inventory-scanner.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #reader { width: 100%; max-width: 500px; margin: 20px auto; }
    input { padding: 15px; font-size: 1.5rem; width: 80%; margin: 10px 0; border: 2px solid #ccc; border-radius: 5px; }
    button { padding: 15px 30px; font-size: 1.2rem; background: #007bff; color: white; border: none; border-radius: 5px; width: 80%; }
    /* ボタンが無効化された時の見た目 */
    button:disabled { background: #ccc !important; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>在庫管理スキャナー <span id="app-version" style="font-size: 0.6em; color: #666;">読み込み中...</span></h3>
  <div id="reader"></div>
  <div id="inputArea" style="display:none;">
    <p id="janText" style="font-weight:bold; margin-bottom: 5px;"></p>
    <p id="stockText" style="color: #28a745; font-weight: bold; font-size: 1.2rem; margin-top: 0;"></p>
    <input type="number" id="qty" value="1" inputmode="decimal" pattern="\d*">
    <br>
    <button id="regBtn" onclick="sendData()">登録</button>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxE2WUH8SuUtiCf_Mkpa2rE4FNXdvR1vFc_q0VkCfTNx3jqG75aTPDPbHR21X9xMIFncA/exec"; 

    let html5QrCode;
    let currentJan = "";
    let localInventory = {}; 
    let isSyncing = false; // 同期中フラグ

    // --- 0. Service Worker 登録（強制リロード機能付き） ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          reg.onupdatefound = () => {
            const installingWorker = reg.installing;
            installingWorker.onstatechange = () => {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('新バージョンを検出。リロードします。');
                location.reload();
              }
            };
          };
        }).catch(err => console.log('SW登録失敗', err));
      });
    }

    // --- 1. sw.js からバージョン情報を自動取得 ---
    async function updateVersionDisplay() {
      try {
        const resp = await fetch('./sw.js?t=' + new Date().getTime());
        const txt = await resp.text();
        const m = txt.match(/CACHE_NAME\s*=\s*['"](.+?)['"]/);
        if(m) document.getElementById('app-version').innerText = m[1].split('-').pop().toUpperCase();
      } catch(e) { console.log("Ver表示失敗"); }
    }
    updateVersionDisplay();

    // --- 2. 在庫リストをバックグラウンドで読み込む ---
    async function refreshInventory() {
      if (isSyncing) return;
      isSyncing = true;
      console.log("同期開始...");
      try {
        const cacheBuster = "?t=" + new Date().getTime();
        const response = await fetch(GAS_URL + cacheBuster);
        const result = await response.json();
        if (result.status === "success" && result.data) {
          localInventory = {};
          for (let key in result.data) {
            localInventory[String(key)] = result.data[key];
          }
          console.log("同期完了");
        }
      } catch (err) {
        console.error("同期失敗:", err);
      } finally {
        isSyncing = false;
      }
    }

    // --- 3. 在庫表示（待ち合わせ機能付き） ---
    async function displayStock(jan) {
      // 1. まず親の「箱」を表示させる！
      const inputArea = document.getElementById('inputArea');
      inputArea.style.display = "block";

      // JANコードも先に表示させておくと安心です
      document.getElementById('janText').innerText = "JAN: " + searchKey;

      const stockStatus = document.getElementById('stockText');
      const searchKey = String(jan).trim();

      if (isSyncing) {
        stockStatus.innerText = "最新データ取得中...⏳";
        while (isSyncing) {
          await new Promise(resolve => setTimeout(resolve, 200));
        }
      }

      const stock = localInventory[searchKey];
      if (stock !== undefined) {
        stockStatus.innerText = "BY現在庫: " + stock + " 個";
      } else {
        stockStatus.innerText = "BY現在庫: 0 (未登録商品)";
      }
    }

    // --- 4. カメラ起動 ---
    function startScanner() {
      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('reader').style.display = 'block';
      document.getElementById('stockText').innerText = "";

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
      }

      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 280, height: 150 } },
        (data) => {
          currentJan = data;
          html5QrCode.stop().then(async () => {
            // 1. まずカメラを隠して、入力エリア（外枠）を表示させる！
            document.getElementById('reader').style.display = 'none';
            document.getElementById('inputArea').style.display = 'block'; // ここを上に持ってくる
            
            // 2. とりあえずJANコードだけ先に表示
            document.getElementById('janText').innerText = "JAN: " + data;
            
            // 3. この中で「最新データ取得中...⏳」が表示される
            await displayStock(data); 
            
            // 4. フォーカス処理
            setTimeout(() => {
              const qty = document.getElementById('qty');
              qty.focus();
              qty.select();
            }, 200);
          });
        }
      ).catch(err => console.error(err));
    }

    // --- 5. データ送信 ---
    async function sendData() {
      const qtyInput = document.getElementById('qty');
      const qty = qtyInput.value;
      if (!qty) return alert("数量を入れてね");

      const btn = document.getElementById('regBtn');
      btn.disabled = true;
      btn.innerText = "送信中...";

      try {
        const params = new URLSearchParams({ jan: currentJan, qty: qty });
        const response = await fetch(GAS_URL, { method: "POST", body: params });
        const result = await response.json();

        // if (result.status === "success") {
        //   alert("登録完了！");
        //   const searchKey = String(currentJan).trim();
        //   const current = parseInt(localInventory[searchKey] || 0);
        //   localInventory[searchKey] = current + parseInt(qty);
        //   qtyInput.value = "1";
        //   startScanner();
        //   refreshInventory(); // 裏で最新状態を再取得（isSyncingがtrueになる）
        // }
        if (result.status === "success") {
          // ローカルデータを即時更新
          const searchKey = String(currentJan).trim();
          const addQty = parseInt(qty, 10);
          localInventory[searchKey] = (parseInt(localInventory[searchKey] || 0)) + addQty;
          
          // 表示を更新してからスキャナーへ
          await displayStock(currentJan); 
          alert("登録完了！現在の在庫: " + localInventory[searchKey]); 
          
          qtyInput.value = "1";
          startScanner();
      }
      } catch (err) {
        alert("送信失敗");
      } finally {
        btn.disabled = false;
        btn.innerText = "登録";
      }
    }

    // 実行
    refreshInventory(); 
    startScanner();
  </script>
</body>
</html>
