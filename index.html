<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫管理スキャナー</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #reader { width: 100%; max-width: 500px; margin: 20px auto; }
    input { padding: 15px; font-size: 1.5rem; width: 80%; margin: 10px 0; border: 2px solid #ccc; border-radius: 5px; }
    button { padding: 15px 30px; font-size: 1.2rem; background: #007bff; color: white; border: none; border-radius: 5px; width: 80%; }
    /* ボタンが無効化された時の見た目 */
    button:disabled { background: #ccc !important; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>在庫管理スキャナー</h3>
  <div id="reader"></div>
  <div id="inputArea" style="display:none;">
    <p id="janText" style="font-weight:bold;"></p>
    <input type="number" id="qty" value="1" placeholder="数量を入力">
    <br>
    <button id="regBtn" onclick="sendData()">登録</button>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const GAS_URL = "ここにあなたのURL"; // ←再度貼り付けてください
    let currentJan = "";
    
    const html5QrCode = new Html5Qrcode("reader");
    
    // スキャン開始：qrboxを横長にして読み取りやすく調整
   html5QrCode.start({ facingMode: "environment" }, { 
      fps: 10, 
      qrbox: { width: 300, height: 150 } 
    }, (data) => {
      currentJan = data;
      
      // カメラを止める
      html5QrCode.stop().then(() => {
        document.getElementById('reader').style.display = 'none';
        document.getElementById('janText').innerText = "JAN: " + data;
        
        const inputArea = document.getElementById('inputArea');
        inputArea.style.display = 'block';
        
        const qtyInput = document.getElementById('qty');
        
        // ★修正ポイント：少しだけ時間を置いてからフォーカス
        setTimeout(() => {
          qtyInput.focus();
          qtyInput.select(); // 既存の文字「1」を選択状態にしてすぐ書き換え可能にする
        }, 200); 
      });
    });

    function sendData() {
      const qty = document.getElementById('qty').value;
      const registerBtn = document.getElementById('regBtn');

      if (!qty) { alert("数量を入力してください"); return; }

      registerBtn.disabled = true;
      registerBtn.innerText = "送信中...";

      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ jan: currentJan, qty: qty })
      })
      .then(() => {
        alert("登録完了！");
        location.reload();
      })
      .catch(error => {
        alert("エラー: " + error);
        registerBtn.disabled = false;
        registerBtn.innerText = "登録";
      });
    }
  </script>
</body>
</html>
