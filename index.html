<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在庫管理スキャナー Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        #interactive.viewport {
            position: relative;
            width: 100%;
            height: 180px;
            overflow: hidden;
            border-radius: 0 0 1.5rem 1.5rem;
            background: #000;
        }
        #interactive.viewport canvas, video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .drawingBuffer {
            display: none;
        }
        
        /* スキャンエリアのオーバーレイ */
        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 5;
        }

        /* 横長のターゲットガイド枠 */
        .scanner-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 60px;
            border: 2px solid #3b82f6; /* Blue 500 */
            border-radius: 8px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.3);
            z-index: 10;
            pointer-events: none;
        }

        /* 枠の角の装飾 */
        .scanner-guide::before, .scanner-guide::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 4px solid #fff;
        }
        /* Top Left */
        .scanner-guide::before {
            top: -4px;
            left: -4px;
            border-right: 0;
            border-bottom: 0;
            border-radius: 8px 0 0 0;
        }
        /* Bottom Right */
        .scanner-guide::after {
            bottom: -4px;
            right: -4px;
            border-left: 0;
            border-top: 0;
            border-radius: 0 0 8px 0;
        }

        /* スキャン線の演出 (ガイド枠内) */
        .scanner-laser {
            position: absolute;
            top: 0;
            left: 5%;
            width: 90%;
            height: 2px;
            background: rgba(255, 0, 0, 0.7);
            box-shadow: 0 0 12px rgba(255, 0, 0, 1);
            z-index: 11;
            animation: scan-line 2s infinite ease-in-out;
        }
        @keyframes scan-line {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .scale-in-center {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <!-- Camera Preview at the very top -->
    <div id="interactive" class="viewport w-full max-w-md mx-auto flex items-center justify-center text-white">
        <!-- ガイド枠とレーザー (スキャン中のみ表示を制御可能) -->
        <div id="scanner-ui" class="hidden absolute inset-0 z-10">
            <div class="scanner-guide">
                <div class="scanner-laser"></div>
            </div>
        </div>
        <p id="scanner-placeholder" class="z-20">カメラを起動してください</p>
    </div>

    <div class="max-w-md mx-auto p-4">
        <!-- Header -->
        <header class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800">在庫管理スキャナー</h1>
            <div id="status-indicator" class="flex items-center text-sm text-gray-400">
                <span id="status-dot" class="w-2 h-2 bg-gray-400 rounded-full mr-2"></span>
                <span id="status-text">オフライン</span>
            </div>
        </header>

        <!-- Scanner Section Button -->
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-6 border border-gray-100">
            <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                スキャン開始
            </button>
        </div>

        <!-- Modal Backdrop -->
        <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/60 z-40 transition-opacity backdrop-blur-sm" onclick="closeResult()"></div>

        <!-- Result / Input Section (Half Modal) -->
        <div id="result-card" class="fixed bottom-0 inset-x-0 z-50 transform translate-y-full transition-transform duration-300 ease-out bg-white rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,0.12)] p-6 pb-8 max-h-[85vh] overflow-y-auto w-full max-w-md mx-auto">
            <!-- Modal Handle for swiping down visual cue -->
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">読み取り完了</p>
                    <h2 id="display-name" class="text-xl font-black text-gray-900">読み取り中...</h2>
                    <p id="display-code" class="text-sm text-gray-400 font-mono"></p>
                </div>
                <button onclick="closeResult()" class="text-gray-400 hover:text-gray-600 p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div id="new-item-form" class="hidden mb-4 p-4 bg-blue-50 rounded-xl border border-blue-100">
                <label class="block text-sm font-bold text-blue-700 mb-1">新しく商品名を登録：</label>
                <input type="text" id="input-name" placeholder="例: お茶 500ml" class="w-full p-3 rounded-lg border border-blue-200 focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div class="flex items-center gap-4">
                <div class="flex-1">
                    <label class="block text-xs font-bold text-gray-400 mb-1">数量変更</label>
                    <div class="flex items-center gap-3">
                        <button onclick="adjustQuantity(-1)" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-xl font-bold text-gray-600 hover:bg-gray-50">-</button>
                        <input type="number" id="input-qty" value="0" class="w-16 text-center text-2xl font-bold border-none outline-none">
                        <button onclick="adjustQuantity(1)" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center text-xl font-bold text-gray-600 hover:bg-gray-50">+</button>
                    </div>
                </div>
                <button id="update-btn" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-md hover:bg-blue-700 transition-all active:scale-95 disabled:opacity-50">更新</button>
            </div>
        </div>

        <!-- Inventory List -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 border-b border-gray-50 flex flex-col gap-3 bg-gray-50/50">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-gray-700">在庫一覧</h3>
                    <span id="list-count" class="text-xs font-bold bg-gray-200 text-gray-600 px-2 py-1 rounded-full">0件</span>
                </div>
                <!-- Search Bar -->
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="search-input" placeholder="商品名・JANコードで検索..." class="w-full pl-9 pr-3 py-2 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition-shadow">
                </div>
            </div>
            <ul id="inventory-list" class="divide-y divide-gray-50 max-h-[40vh] overflow-y-auto pb-20">
                <li class="p-8 text-center text-gray-400 text-sm">データを読み込み中...</li>
            </ul>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 bg-gray-900/90 backdrop-blur text-white px-6 py-3 rounded-full transition-all duration-300 shadow-xl flex items-center gap-2 z-50">
        <span id="toast-message"></span>
    </div>

    <script>
        // デプロイしたGASのURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxE2WUH8SuUtiCf_Mkpa2rE4FNXdvR1vFc_q0VkCfTNx3jqG75aTPDPbHR21X9xMIFncA/exec"; 

        let productMaster = {}; 
        let inventoryData = {}; 
        let currentCode = null;
        let isScannerRunning = false;
        
        let detectionBuffer = [];

        const resultCard = document.getElementById('result-card');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const displayName = document.getElementById('display-name');
        const displayCode = document.getElementById('display-code');
        const inputName = document.getElementById('input-name');
        const newItemForm = document.getElementById('new-item-form');
        const inputQty = document.getElementById('input-qty');
        const inventoryList = document.getElementById('inventory-list');
        const listCount = document.getElementById('list-count');
        const updateBtn = document.getElementById('update-btn');
        const scannerUI = document.getElementById('scanner-ui');
        const searchInput = document.getElementById('search-input');

        window.onload = loadSpreadsheetData;
        document.getElementById('start-btn').addEventListener('click', toggleScanner);
        updateBtn.addEventListener('click', handleUpdate);
        searchInput.addEventListener('input', (e) => updateUIList(e.target.value));
        inputName.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
            }
        });

        async function loadSpreadsheetData() {
            if (!GAS_URL || GAS_URL.includes("YOUR_GAS")) {
                showToast("GAS URL未設定");
                return;
            }
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                productMaster = data.master || {};
                inventoryData = data.inventory || {};
                updateStatus(true);
                updateUIList();
            } catch (e) {
                showToast("データ同期エラー");
                updateStatus(false);
            }
        }

        function updateStatus(isOnline) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            dot.className = `w-2 h-2 ${isOnline ? 'bg-green-500' : 'bg-red-500'} rounded-full mr-2`;
            text.innerText = isOnline ? "同期済み" : "接続エラー";
            text.className = isOnline ? "text-green-600" : "text-red-600";
        }

        function toggleScanner() {
            if (isScannerRunning) {
                stopScanner();
            } else {
                startScanner();
            }
        }

        function startScanner() {
            Quagga.init({
                numOfWorkers: navigator.hardwareConcurrency || 4,
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: {
                        width: { min: 640, ideal: 1280 },
                        height: { min: 480, ideal: 720 },
                        facingMode: "environment",
                        aspectRatio: { ideal: 1.7777777778 }
                    },
                },
                locator: {
                    patchSize: "medium",
                    halfSample: true
                },
                decoder: {
                    readers: ["ean_reader"],
                    multiple: false
                }
            }, function(err) {
                if (err) {
                    showToast("カメラを起動できません");
                    return;
                }
                Quagga.start();
                isScannerRunning = true;
                scannerUI.classList.remove('hidden');
                document.getElementById('start-btn').innerText = "カメラを停止";
                document.getElementById('scanner-placeholder').style.display = 'none';
            });

            Quagga.onDetected(onDetected);
        }

        function stopScanner() {
            Quagga.stop();
            isScannerRunning = false;
            scannerUI.classList.add('hidden');
            document.getElementById('start-btn').innerText = "スキャン開始";
        }

        function onDetected(data) {
            const code = data.codeResult.code;
            
            detectionBuffer.push(code);
            if (detectionBuffer.length > 5) {
                detectionBuffer.shift();
            }

            const count = detectionBuffer.filter(c => c === code).length;
            if (count < 3) return;

            detectionBuffer = [];
            if (currentCode === code) return; 
            
            stopScanner();
            document.getElementById('start-btn').innerText = "スキャン再開";
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            
            openManualUpdate(code);
        }

        function openManualUpdate(code) {
            currentCode = code;
            displayCode.innerText = `JAN: ${code}`;
            
            if (productMaster[code]) {
                displayName.innerText = productMaster[code];
                newItemForm.classList.add('hidden');
                inputQty.value = inventoryData[code] || 0;
            } else {
                displayName.innerText = "未登録の商品";
                newItemForm.classList.remove('hidden');
                inputName.value = "";
                inputQty.value = 1;
            }

            modalBackdrop.classList.remove('hidden');
            resultCard.classList.remove('translate-y-full');
        }

        function adjustQuantity(val) {
            let current = parseInt(inputQty.value) || 0;
            inputQty.value = Math.max(0, current + val);
        }

        function closeResult() {
            modalBackdrop.classList.add('hidden');
            resultCard.classList.add('translate-y-full');
            currentCode = null;
            detectionBuffer = [];
        }

        async function handleUpdate() {
            const name = productMaster[currentCode] || inputName.value.trim();
            const qty = parseInt(inputQty.value) || 0;

            if (!name) {
                showToast("商品名を入力してください");
                return;
            }

            updateBtn.disabled = true;
            updateBtn.innerText = "送信中...";

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ code: currentCode, name: name, qty: qty })
                });
                const result = await response.json();
                if (result.status === "success") {
                    productMaster[currentCode] = name;
                    inventoryData[currentCode] = qty;
                    updateUIList(searchInput.value);
                    showToast("更新が完了しました");
                    closeResult();
                } else {
                    throw new Error(result.message);
                }
            } catch (e) {
                showToast("通信エラー");
            } finally {
                updateBtn.disabled = false;
                updateBtn.innerText = "更新";
            }
        }

        function updateUIList(query = '') {
            inventoryList.innerHTML = "";
            let entries = Object.entries(inventoryData);
            
            if (query.trim()) {
                const q = query.trim().toLowerCase();
                entries = entries.filter(([code, _]) => {
                    const name = productMaster[code] || "不明";
                    return code.toLowerCase().includes(q) || name.toLowerCase().includes(q);
                });
            }
            
            listCount.innerText = `${entries.length}件`;
            if (entries.length === 0) {
                inventoryList.innerHTML = '<li class="p-8 text-center text-gray-400 text-sm">該当なし</li>';
                return;
            }
            entries.sort((a, b) => b[1] - a[1]).forEach(([code, qty]) => {
                const name = productMaster[code] || "不明";
                const li = document.createElement('li');
                li.className = "p-4 flex justify-between items-center bg-white border-b border-gray-50 cursor-pointer hover:bg-gray-50 active:bg-gray-100 transition-colors";
                li.onclick = () => openManualUpdate(code);
                li.innerHTML = `
                    <div class="flex-1 pr-4 pointer-events-none">
                        <p class="font-bold text-gray-800 truncate">${name}</p>
                        <p class="text-xs text-gray-400 font-mono">${code}</p>
                    </div>
                    <div class="text-right pointer-events-none">
                        <span class="text-2xl font-black ${qty <= 5 ? 'text-red-500' : 'text-blue-600'}">${qty}</span>
                        <span class="text-xs font-bold text-gray-400 ml-1">個</span>
                    </div>
                `;
                inventoryList.appendChild(li);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
