<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫管理スキャナー</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./inventory-scanner.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #reader { width: 100%; max-width: 500px; margin: 20px auto; }
    input { padding: 15px; font-size: 1.5rem; width: 80%; margin: 10px 0; border: 2px solid #ccc; border-radius: 5px; }
    button { padding: 15px 30px; font-size: 1.2rem; background: #007bff; color: white; border: none; border-radius: 5px; width: 80%; }
    /* ボタンが無効化された時の見た目 */
    button:disabled { background: #ccc !important; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>在庫管理スキャナー</h3>
  <div id="reader"></div>
  <div id="inputArea" style="display:none;">
    <p id="janText" style="font-weight:bold; margin-bottom: 5px;"></p>
    <p id="stockText" style="color: #28a745; font-weight: bold; font-size: 1.2rem; margin-top: 0;"></p>
    <input type="number" id="qty" value="1" inputmode="decimal" pattern="\d*">
    <br>
    <button id="regBtn" onclick="sendData()">登録</button>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    // 1. サービスワーカーを登録（これがないとAndroidはアプリと認めない）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').then(function(registration) {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, function(err) {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
    
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxE2WUH8SuUtiCf_Mkpa2rE4FNXdvR1vFc_q0VkCfTNx3jqG75aTPDPbHR21X9xMIFncA/exec"; // ←再度貼り付けてください
    let currentJan = "";
    
    const html5QrCode = new Html5Qrcode("reader");
    
    // スキャン開始：qrboxを横長にして読み取りやすく調整
html5QrCode.start({ facingMode: "environment" }, { 
      fps: 10, 
      qrbox: { width: 300, height: 150 } 
    }, (data) => {
      currentJan = data;
      
      // カメラを止めて入力を準備
      html5QrCode.stop().then(() => {
        document.getElementById('reader').style.display = 'none';
        document.getElementById('janText').innerText = "JAN: " + data;
        document.getElementById('stockText').innerText = "在庫を確認中..."; // ローディング表示
        
        const inputArea = document.getElementById('inputArea');
        inputArea.style.display = 'block';

        // ★追加：GASに現在のBY在庫を問い合わせる (GETリクエスト)
        fetch(`${GAS_URL}?jan=${data}`)
          .then(response => response.json())
          .then(result => {
            if (result.status === "success") {
              document.getElementById('stockText').innerText = "BY現在庫: " + result.stock + " 個";
            } else {
              document.getElementById('stockText').innerText = "在庫数取得エラー";
            }
          })
          .catch(() => {
            document.getElementById('stockText').innerText = "在庫情報の取得に失敗";
          });

        // 数量入力へフォーカス
        setTimeout(() => {
          const qtyInput = document.getElementById('qty');
          qtyInput.focus();
          qtyInput.select();
        }, 200);
      });
    });

    function sendData() {
      const qty = document.getElementById('qty').value;
      const registerBtn = document.getElementById('regBtn');

      if (!qty) { alert("数量を入力してください"); return; }

      registerBtn.disabled = true;
      registerBtn.innerText = "送信中...";

      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ jan: currentJan, qty: qty })
      })
      .then(() => {
        alert("登録完了！");
        location.reload();
      })
      .catch(error => {
        alert("エラー: " + error);
        registerBtn.disabled = false;
        registerBtn.innerText = "登録";
      });
    }
  </script>
</body>
</html>
