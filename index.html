<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
    <title>BY在庫スキャナー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 検索窓の×ボタン消去 */
        input::-webkit-search-cancel-button,
        input::-webkit-search-decoration {
            -webkit-appearance: none;
            display: none;
        }

        /* Quagga用ビューポート */
        #interactive.viewport {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #interactive.viewport canvas,
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* iPhone風ハーフモーダルアニメーション */
        #result-modal.hidden {
            display: none;
        }

        #modal-content {
            transition: transform 0.3s ease-out;
        }

        #modal-content.translate-y-full {
            transform: translateY(100%);
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-white px-4 py-3 flex justify-between items-center border-b border-gray-200 shrink-0 z-10">
        <div class="flex items-baseline gap-2">
            <h1 class="text-lg font-bold text-gray-900">BY在庫スキャナー</h1>
            <span id="version" class="text-[10px] text-gray-400 font-mono"></span>
        </div>
        <div id="status-indicator" class="flex items-center gap-1.5 text-xs font-medium transition-colors">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-300"></span>
            <span id="status-text">読み込み中...</span>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden">

        <section id="tab-scan" class="tab-content active h-full bg-gray-900">
            <div id="interactive" class="viewport flex-1 relative">
                <div id="scanner-placeholder"
                    class="absolute inset-0 flex items-center justify-center text-white/50 text-sm">
                    カメラを起動してください
                </div>
            </div>
            <div class="p-6 bg-gray-100 shrink-0">
                <button id="start-btn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                        </path>
                    </svg>
                    スキャン開始
                </button>
            </div>
        </section>

        <section id="tab-search" class="tab-content h-full bg-white">
            <div class="px-4 py-3 flex justify-between items-center bg-gray-50/50 border-b border-gray-100">
                <h2 class="font-bold text-gray-800">BY在庫一覧</h2>
                <span id="list-count"
                    class="bg-gray-200 text-gray-600 text-[10px] px-2 py-0.5 rounded-full font-bold">0件</span>
            </div>

            <ul id="inventory-list" class="flex-1 overflow-y-auto divide-y divide-gray-50 pb-24">
                <li class="p-8 text-center text-gray-400 text-sm">データを同期しています...</li>
            </ul>

            <div class="absolute bottom-6 left-0 right-0 px-4 pointer-events-none">
                <div class="relative max-w-md mx-auto pointer-events-auto">
                    <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </span>
                    <input type="search" id="search-input" placeholder="商品名・JANコードで検索..."
                        class="w-full pl-11 pr-4 py-3.5 bg-white border border-gray-200 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] focus:outline-none focus:ring-2 focus:ring-blue-500 text-[15px]">
                </div>
            </div>
        </section>

    </main>

    <nav class="bg-white border-t border-gray-200 shrink-0 pb-safe">
        <div class="flex justify-around items-center h-20">
            <button onclick="switchTab('scan')" id="nav-scan"
                class="flex flex-col items-center gap-1.5 transition-colors text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path
                        d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>
                <span class="text-[10px] font-bold">Scan</span>
            </button>
            <button onclick="switchTab('search')" id="nav-search"
                class="flex flex-col items-center gap-1.5 transition-colors text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <span class="text-[10px] font-bold">Search</span>
            </button>
            <button class="flex flex-col items-center gap-1.5 text-gray-200 cursor-not-allowed">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path
                        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                    </path>
                </svg>
                <span class="text-[10px] font-bold">Message</span>
            </button>
        </div>
    </nav>

    <div id="result-modal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-end backdrop-blur-sm"
        onclick="if(event.target === this) closeResult()">
        <div id="modal-content"
            class="bg-white w-full max-w-md mx-auto rounded-t-[2.5rem] p-6 pb-10 shadow-2xl translate-y-full">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>

            <div class="mb-8">
                <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-1">Detection Completed</p>
                <h3 id="display-name" class="text-2xl font-black text-gray-900 leading-tight">読み取り中...</h3>
                <p id="display-code" class="text-sm font-mono text-gray-400 mt-1"></p>
            </div>

            <div class="space-y-6 mb-10">
                <div id="new-item-form" class="hidden animate-in fade-in slide-in-from-top-2">
                    <label
                        class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">新規商品名</label>
                    <input type="text" id="input-name" placeholder="商品名を入力..."
                        class="w-full border-b-2 border-gray-100 py-2 focus:border-blue-500 outline-none text-lg font-medium transition-colors">
                </div>
                <div>
                    <label
                        class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2">現在の在庫数</label>
                    <input type="search" inputmode="numeric" pattern="[0-9]*" id="input-qty"
                        class="w-full border-b-2 border-gray-100 py-2 focus:border-blue-500 outline-none text-4xl font-black text-blue-600 transition-colors">
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="closeResult()" class="flex-1 py-4 text-gray-400 font-bold text-sm">キャンセル</button>
                <button id="update-btn" onclick="handleUpdate()"
                    class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all disabled:opacity-50">更新する</button>
            </div>
        </div>
    </div>

    <div id="toast"
        class="fixed top-12 left-1/2 -translate-x-1/2 bg-gray-900/90 text-white px-6 py-3 rounded-full text-sm font-bold shadow-xl opacity-0 translate-y-[-20px] transition-all duration-300 pointer-events-none z-[100] backdrop-blur">
        <span id="toast-message"></span>
    </div>

    <script>
        // Version management
        const versionScript = document.createElement('script');
        versionScript.src = 'version.js?v=' + Date.now();
        document.head.appendChild(versionScript);
        // version.jsが読み終わってからすべてを開始する
        versionScript.onload = () => {
            if (document.getElementById('version')) {
                document.getElementById('version').innerText = APP_VERSION;
            }
            // URLが確定したのでデータを取得しに行く
            init();
        };

        // App State
        let productMaster = {};
        let inventoryData = {};
        let currentCode = null;
        let isScannerRunning = false;
        let detectionBuffer = [];

        // UI Elements
        const inventoryList = document.getElementById('inventory-list');
        const listCount = document.getElementById('list-count');
        const searchInput = document.getElementById('search-input');
        const updateBtn = document.getElementById('update-btn');
        const resultModal = document.getElementById('result-modal');
        const modalContent = document.getElementById('modal-content');
        const inputQty = document.getElementById('input-qty');
        const inputName = document.getElementById('input-name');

        // タブ切り替え
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            const navScan = document.getElementById('nav-scan');
            const navSearch = document.getElementById('nav-search');

            if (tab === 'scan') {
                navScan.classList.add('text-blue-600'); navScan.classList.remove('text-gray-400');
                navSearch.classList.add('text-gray-400'); navSearch.classList.remove('text-blue-600');
            } else {
                navSearch.classList.add('text-blue-600'); navSearch.classList.remove('text-gray-400');
                navScan.classList.add('text-gray-400'); navScan.classList.remove('text-blue-600');
                if (isScannerRunning) stopScanner();
                updateUIList(searchInput.value);
            }
        }

        // 初期化
        async function init() {
            if (!GAS_URL) return showToast("GAS URLが設定されていません");
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                productMaster = data.master || {};
                inventoryData = data.inventory || {};
                updateStatus(true);
                updateUIList();
            } catch (e) {
                showToast("データ同期失敗");
                updateStatus(false);
            }
        }

        function updateStatus(isOnline) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            dot.className = `w-2 h-2 rounded-full ${isOnline ? 'bg-green-500' : 'bg-red-500'}`;
            text.innerText = isOnline ? "同期済み" : "エラー";
            text.className = isOnline ? "text-green-600" : "text-red-600";
        }

        // スキャナー制御
        function toggleScanner() { isScannerRunning ? stopScanner() : startScanner(); }

        function startScanner() {
            Quagga.init({
                inputStream: {
                    name: "Live", type: "LiveStream", target: "#interactive",
                    constraints: { facingMode: "environment", aspectRatio: { ideal: 1 } }
                },
                decoder: { readers: ["ean_reader"] },
                locator: { patchSize: "medium", halfSample: true }
            }, (err) => {
                if (err) return showToast("カメラ起動失敗");
                Quagga.start();
                isScannerRunning = true;
                document.getElementById('start-btn').innerText = "カメラを停止";
                document.getElementById('scanner-placeholder').style.display = 'none';
            });
            Quagga.onDetected(onDetected);
        }

        function stopScanner() {
            Quagga.stop();
            isScannerRunning = false;
            document.getElementById('start-btn').innerText = "スキャン開始";
        }

        function onDetected(data) {
            const code = data.codeResult.code;
            detectionBuffer.push(code);
            if (detectionBuffer.length > 5) detectionBuffer.shift();
            if (detectionBuffer.filter(c => c === code).length < 3) return;

            detectionBuffer = [];
            if (currentCode === code) return;
            stopScanner();
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            openManualUpdate(code);
        }

        function openManualUpdate(code) {
            currentCode = code;
            document.getElementById('display-code').innerText = code;

            let focusTarget = inputQty;
            if (productMaster[code]) {
                document.getElementById('display-name').innerText = productMaster[code];
                document.getElementById('new-item-form').classList.add('hidden');
                inputQty.value = inventoryData[code] || 0;
            } else {
                document.getElementById('display-name').innerText = "新規商品";
                document.getElementById('new-item-form').classList.remove('hidden');
                inputName.value = "";
                inputQty.value = "";
                focusTarget = inputName;
            }

            resultModal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('translate-y-full');
                focusTarget.focus();
                if (focusTarget.select) focusTarget.select();
            }, 50);
        }

        function closeResult() {
            modalContent.classList.add('translate-y-full');
            setTimeout(() => {
                resultModal.classList.add('hidden');
                currentCode = null;
            }, 300);
        }

        async function handleUpdate() {
            const targetCode = currentCode;
            const name = productMaster[targetCode] || inputName.value.trim();
            const qty = parseInt(inputQty.value) || 0;

            if (!targetCode || !name) return showToast("入力内容を確認してください");

            // 楽観的更新
            productMaster[targetCode] = name;
            inventoryData[targetCode] = qty;
            updateUIList(searchInput.value);
            closeResult();
            showToast("保存しています...");

            updateBtn.disabled = true;
            try {
                const res = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ code: targetCode, name: name, qty: qty }),
                    keepalive: true
                });
                if (!res.ok) throw new Error();
                showToast("更新が完了しました");
            } catch (e) {
                showToast("⚠️通信失敗（再試行してください）");
            } finally {
                updateBtn.disabled = false;
            }
        }

        function normalizeString(str) {
            return (str || "").normalize('NFKC').replace(/[\u3041-\u3096]/g, m => String.fromCharCode(m.charCodeAt(0) + 0x60)).toLowerCase();
        }

        function updateUIList(query = '') {
            inventoryList.innerHTML = "";
            let entries = Object.entries(inventoryData);

            if (query.trim()) {
                const q = normalizeString(query);
                entries = entries.filter(([code]) => {
                    const n = normalizeString(productMaster[code]);
                    return code.includes(q) || n.includes(q);
                });
            }

            listCount.innerText = `${entries.length}件`;
            if (entries.length === 0) {
                inventoryList.innerHTML = '<li class="p-12 text-center text-gray-300 text-sm font-medium">該当する商品はありません</li>';
                return;
            }

            entries.sort((a, b) => b[1] - a[1]).forEach(([code, qty]) => {
                const name = productMaster[code] || "未登録";
                const li = document.createElement('li');
                li.className = "px-5 py-6 flex justify-between items-center bg-white active:bg-gray-50 transition-colors";
                li.innerHTML = `
                    <div class="flex-1 min-w-0 pr-4 pointer-events-none">
                        <p class="text-[15px] font-bold text-gray-900 truncate">${name}</p>
                        <p class="text-[11px] text-gray-400 font-mono mt-0.5 tracking-wider">${code}</p>
                    </div>
                    <div class="text-right flex items-baseline gap-1 pointer-events-none">
                        <span class="text-2xl font-black ${qty === 0 ? 'text-red-500' : 'text-blue-600'}">${qty}</span>
                        <span class="text-[10px] font-bold text-gray-400">個</span>
                    </div>
                `;
                li.onclick = () => openManualUpdate(code);
                inventoryList.appendChild(li);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            t.classList.replace('translate-y-[-20px]', 'translate-y-0');
            setTimeout(() => {
                t.classList.replace('opacity-100', 'opacity-0');
                t.classList.replace('translate-y-0', 'translate-y-[-20px]');
            }, 3000);
        }

        // Event Listeners
        document.getElementById('start-btn').onclick = toggleScanner;
        searchInput.oninput = (e) => updateUIList(e.target.value);
        inputQty.onfocus = function () { setTimeout(() => this.select(), 100); };
        inputName.onkeydown = (e) => { if (e.key === 'Enter') inputQty.focus(); };
        inputQty.onkeydown = (e) => { if (e.key === 'Enter') handleUpdate(); };

    </script>
</body>

</html>
