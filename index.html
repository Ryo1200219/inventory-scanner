<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在庫管理スキャナー</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./inventory-scanner.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #reader { width: 100%; max-width: 500px; margin: 20px auto; }
    input { padding: 15px; font-size: 1.5rem; width: 80%; margin: 10px 0; border: 2px solid #ccc; border-radius: 5px; }
    button { padding: 15px 30px; font-size: 1.2rem; background: #007bff; color: white; border: none; border-radius: 5px; width: 80%; }
    /* ボタンが無効化された時の見た目 */
    button:disabled { background: #ccc !important; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>在庫管理スキャナー</h3>
  <div id="reader"></div>
  <div id="inputArea" style="display:none;">
    <p id="janText" style="font-weight:bold; margin-bottom: 5px;"></p>
    <p id="stockText" style="color: #28a745; font-weight: bold; font-size: 1.2rem; margin-top: 0;"></p>
    <input type="number" id="qty" value="1" inputmode="decimal" pattern="\d*">
    <br>
    <button id="regBtn" onclick="sendData()">登録</button>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>

   const GAS_URL = "https://script.google.com/macros/s/AKfycbxE2WUH8SuUtiCf_Mkpa2rE4FNXdvR1vFc_q0VkCfTNx3jqG75aTPDPbHR21X9xMIFncA/exec"; 

if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW登録失敗', err));
      });
    }

    let html5QrCode;
    let currentJan = "";
    let localInventory = {}; // 初期値は空

    // --- 1. 在庫リストを読み込む（取得完了まで待機させる仕組みを追加） ---
    async function refreshInventory() {
      console.log("在庫リストを更新中...");
      try {
        // URLの末尾に ?t=1234567... と付けてキャッシュを無効化する
        const cacheBuster = "?t=" + new Date().getTime();
        const response = await fetch(GAS_URL + cacheBuster); 
        const result = await response.json();
        
        if (result.status === "success" && result.data) {
          localInventory = result.data;
          console.log("同期完了:", Object.keys(localInventory).length, "件");
          return true;
        }
      } catch (err) {
        console.error("同期失敗:", err);
      }
      return false;
    }

    // --- 2. スキャン成功時の表示処理（ここが重要） ---
    function displayStock(jan) {
      // localInventory[jan] が undefined や null の場合は 0 を表示
      const stock = (localInventory[jan] !== undefined) ? localInventory[jan] : 0;
      document.getElementById('stockText').innerText = "BY現在庫: " + stock + " 個";
    }

    // --- 3. カメラ起動 ---
    function startScanner() {
      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('reader').style.display = 'block';
      document.getElementById('stockText').innerText = "";

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
      }

      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 280, height: 150 } },
        (data) => {
          currentJan = data;
          html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('janText').innerText = "JAN: " + data;
            
            // ★手元のデータから表示
            displayStock(data);
            
            document.getElementById('inputArea').style.display = 'block';
            setTimeout(() => {
              const qty = document.getElementById('qty');
              qty.focus();
              qty.select();
            }, 200);
          });
        }
      ).catch(err => console.error(err));
    }

    // --- 4. データ送信 ---
    async function sendData() {
      const qtyInput = document.getElementById('qty');
      const qty = qtyInput.value;
      if (!qty) return alert("数量を入れてね");

      const btn = document.querySelector('button[onclick="sendData()"]');
      btn.disabled = true;
      btn.innerText = "送信中...";

      try {
        const params = new URLSearchParams({ jan: currentJan, qty: qty });
        const response = await fetch(GAS_URL, { method: "POST", body: params });
        const result = await response.json();

        if (result.status === "success") {
          alert("登録完了！");

          // ★手元の数値を即時更新（文字列結合を防ぐためparseInt）
          const current = parseInt(localInventory[currentJan] || 0);
          localInventory[currentJan] = current + parseInt(qty);

          qtyInput.value = "1";
          startScanner();
          refreshInventory(); // バックグラウンドで最新同期
        }
      } catch (err) {
        alert("送信失敗");
      } finally {
        btn.disabled = false;
        btn.innerText = "登録";
      }
    }

    // 起動時にデータを取ってからカメラを準備する
    refreshInventory().then(() => {
      startScanner();
    });
  </script>
</body>
</html>
